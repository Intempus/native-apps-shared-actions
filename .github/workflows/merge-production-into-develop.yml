name: Merge production branch into develop (reusable)

on:
  workflow_call:

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MERGE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge into develop
        run: |
          git checkout develop
          git merge origin/${{ github.ref_name }} --no-edit
          git push origin develop

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"⚠️ *${{ github.event.repository.name }}*: merge ${{ github.ref_name }}→develop FAILED. Conflict needs manual resolution.\"}" \
            "${{ secrets.MOBILE_DEVOPS_SLACK_WEBHOOK_URL }}"
